<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../myco.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>world Sound</title>
    <script src="quotes.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3a0996 0%, #4d0260 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
        }

        .container {
            width: 80vw;
            /* 屏幕宽度的 80% */
            max-width: 800px;
            /* 最大不超过 800px */
            margin: 0 auto 60px;
            background: linear-gradient(135deg, #02214f 0%, #02214f 50%, #310156 100%);
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: all 0.3s ease;
        }

        .container:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }

        .quote {
            margin-bottom: 40px;
            font-size: 24px;
            line-height: 1.6;
            color: #10901a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .author {
            font-size: 16px;
            color: #079231;
            font-style: italic;
        }
    </style>
</head>

<body>
    <!-- <div class="container">
        <div class="quote" id="quote"></div>
        <div class="author" id="author"></div>
    </div> -->

    <script>

        function showQuote(quote, author) {
            const bodyEl = document.querySelector("body");
            let container = document.createElement('div');
            let quoteEl = document.createElement('div');
            let authorEl = document.createElement('div');

            quoteEl.textContent = quote;
            authorEl.textContent = "—— " + author;
            quoteEl.classList.add("quote");
            authorEl.classList.add("author");
            container.classList.add("container");
            container.appendChild(quoteEl);
            container.appendChild(authorEl);
            bodyEl.appendChild(container);
        }

        father = 1;
        // 显示所有名言
        function showRandomQuote() {
            let randomIndex = Math.floor(Math.random() * (quotes.length - father) + father);

            showQuote(quotes[randomIndex].quote, quotes[randomIndex].author);


            for (let i = 0; i < father; i++) {
                showQuote(quotes[i].quote, quotes[i].author);
            }
        }

        // 页面加载自动显示一句
        showRandomQuote();

        window.onload = document.querySelectorAll(".container")[1].addEventListener("click", function () {
            window.location.href = "https://shangcc.top/project/list3/index.html";
        });
    </script>
</body>

</html>
